@if (message()) {
  <section class="app-alert" role="alert" aria-live="polite" aria-atomic="true">
    <div class="app-alert__content">
      <strong>System message:</strong>
      <span>{{ message() }}</span>
    </div>
    <button type="button" class="app-alert__close" (click)="close()" aria-label="Close alert">
      x
    </button>
  </section>
}
